site_name: Caldyr
site_url: https://rpg32.github.io/caldyr/
site_description: >-
  Open-source, AI-native process simulation & techno-economic analysis.
repo_url: https://github.com/rpg32/caldyr
repo_name: rpg32/caldyr
# Internal planning docs live under docs/ for convenience but are not published.
exclude_docs: |
  REACTION_EDITOR_PLAN.md
  UX_BACKLOG.md
theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - tables
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tutorials:
    - Overview: tutorials.md
    - Ammonia synthesis loop: tutorial-ammonia-loop.md
    - Distillation column: tutorial-distillation-tea.md
    - Optimization: tutorial-optimization.md
  - Using the app: ui-guide.md
  - Unit operations: unit-operations.md
  - Analysis tools: analysis-tools.md
  - AI copilot & MCP: ai.md
  - Data model (.flow): DATA_MODEL.md
  - Thermodynamics: THERMO.md
  - Economics (TEA): ECONOMICS.md

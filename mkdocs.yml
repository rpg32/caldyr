site_name: Caldyr
site_description: >-
  Open-source, AI-native process simulation & techno-economic analysis.
repo_url: https://github.com/caldyr/caldyr  # update on publication
theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - tables
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Using the app: ui-guide.md
  - AI copilot & MCP: ai.md
  - Data model (.flow): DATA_MODEL.md
  - Thermodynamics: THERMO.md
  - Economics (TEA): ECONOMICS.md
